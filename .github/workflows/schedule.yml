name: Run Daily Math Postings

on:
  schedule:
    - cron: '5 8 * * *'
    - cron: '5 14 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gdown

      - name: Run Morning Post
        if: github.event.schedule == '5 8 * * *'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py morning

      - name: Run Evening Post
        if: github.event.schedule == '5 14 * * *' || github.event_name == 'workflow_dispatch'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py evening
