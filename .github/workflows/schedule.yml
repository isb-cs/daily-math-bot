name: Run Daily Math Posting
on:
  schedule:
    # GitHub uses UTC time. 
    # 08:00 UTC is 10:00 AM Central European Summer Time (CEST)
    - cron: '0 8 * * *'
    # 19:00 UTC is 09:00 PM Central European Summer Time (CEST)
    - cron: '0 19 * * *'
  workflow_dispatch: # This adds a manual "Run" button so you can test it instantly!

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gdown

      - name: Run Morning Post
        # If it is 8:00 AM UTC, run the morning version of our script
        if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py morning

      - name: Run Evening Post
        # If it is 7:00 PM UTC, run the evening version of our script
        if: github.event.schedule == '0 19 * * *'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py evening
